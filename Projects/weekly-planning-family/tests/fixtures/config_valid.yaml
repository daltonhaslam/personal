# Keep Todoist project roles, gmail account names, and schema shape in sync
# with Projects/weekly-planning-family/config.example.yaml. This fixture
# exercises the loader's happy path; the example file documents the schema
# for real users.
session:
  default_day: thursday
  default_time: "20:00"
  browser: "Google Chrome"
  server_port: 8000
  server_abandon_timeout_hours: 4

calendars:
  shared_general: shared-general-id@group.calendar.google.com
  shared_meals: shared-meals-id@group.calendar.google.com
  dalton_personal: dalton@example.com
  schools:
    - id: school1@import.calendar.google.com
      name: "Elementary"

gmail:
  accounts:
    - name: dalton
      address: dalton@example.com
    - name: maggie
      address: maggie@example.com
  kid_school_label_id: Label_1234567890123456789
  default_query: "newer_than:7d -category:promotions"
  max_results_per_account: 50

todoist:
  projects:
    shopping:
      name: "To buy"
      id: "1111"
    shopping_wants:
      name: "To buy (less necessary)"
      id: "1112"
    general_todos:
      name: "MD ToDos"
      id: "1113"
    home:
      name: "Home"
      id: "1114"
    meals:
      name: "Meals"
      id: "1115"
    date_night_ideas:
      name: "Date Night Ideas"
      id: "1116"
    screen_time:
      name: "Screen time"
      id: "1117"
    gifts_maggie:
      name: "Maggie's Wish List"
      id: "1118"
    gifts_dalton:
      name: "Dalton's Wish List"
      id: "1119"
  collaborator_ids:
    dalton: "9001"
    maggie: "9002"

family:
  owners: [Dalton, Maggie]
  kids:
    - name: TestKid1
      age: 6
    - name: TestKid2
      age: 3
